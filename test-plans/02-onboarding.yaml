# 02-onboarding.yaml
#
# Exercises the onboarding wizard (target: wizard). The wizard is a standalone
# Ink component that does not require a full App or provider. The first screen
# shows "Welcome to Nuka".
#
# DOWNGRADE NOTE: Advancing beyond the welcome screen requires Enter to
# register via ink-testing-library. The harness header documents that
# `useInput` does not always receive a real `setRawMode`, so keystroke
# navigation can be swallowed. We therefore only assert the welcome banner
# rather than navigating further. This still demonstrates the wizard surface
# and proves mountApp({ target: 'wizard' }) works end-to-end.
name: "onboarding wizard welcome screen"
description: >
  Mounts the wizard and asserts the welcome banner renders. Downgraded from
  multi-step wizard navigation because keystroke dispatch via ink-testing-library
  is unreliable when setRawMode is absent.
steps:
  - render: wizard
  - assert:
      contains: "Welcome to Nuka"
cleanup:
  unmount: true
