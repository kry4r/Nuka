# 04-stats-view.yaml
#
# Phase 10 §4.2 — full upgrade.
#
# Drives /stats through the slash registry (registered via setup.slash
# below) and asserts the StatsView dialog renders. The dialog text
# "Tab: switch tab · r: cycle range · Esc: close" is the StatsView
# footer that only appears once the dialog is mounted.
name: "stats view via /stats slash command"
description: >
  Renders the app, drives /stats, waits for the StatsView dialog to
  open, and asserts both tab labels (Overview, Models) plus the dialog
  footer help line render. End-to-end coverage of the slash -> dialog
  effect path.
setup:
  slash:
    - StatsCommand
steps:
  - render: app
  - assert:
      contains: "NUKA"
  - slash: "stats"
  - wait:
      until:
        contains: "Overview"
      timeoutMs: 1500
  - assert:
      contains: "Overview"
  - assert:
      contains: "Models"
  - assert:
      contains: "Tab: switch tab"
cleanup:
  unmount: true
