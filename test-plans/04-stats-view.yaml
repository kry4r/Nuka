# 04-stats-view.yaml
#
# Verifies that the status bar / stats surface renders token/cost information
# or at minimum that the app footer area is present. The harness mounts with
# a mock provider whose ID is "mock"; the session starts with that provider.
#
# DOWNGRADE NOTE: Actual cost/token stats only appear after a real agent turn
# completes. runAgent is a no-op in the headless harness. We therefore assert
# the session meta line (branch, version) which is always rendered rather than
# live token counts.
name: "stats view surface (downgraded)"
description: >
  Mounts the app and asserts the git-branch / version status line renders.
  Downgraded from live token-cost stats because runAgent is a no-op in the
  headless harness — no real turns execute to produce usage numbers.
steps:
  - render: app
  # The Welcome screen always shows the NUKA brand header.
  - assert:
      contains: "NUKA"
  # Assert the version string is rendered (e.g. "0.0.0-test" or "0.1.0").
  - assert:
      regex: "0\\."
cleanup:
  unmount: true
