# 01-offline-boot.yaml
#
# Verifies the app boots successfully in offline mode (no providers configured)
# and renders its welcome hero. The harness uses makeMinimalAppDeps which
# intentionally starts with zero providers — exactly the offline scenario.
# (NUKA wordmark is now an ASCII-art logo, so we assert the hero hint
# "/ for commands" instead of the literal "NUKA" string.)
name: "offline boot"
description: >
  Boot the TUI app with no providers configured. Assert the hero hint
  is visible and the process stays alive (no hard-exit on zero providers).
steps:
  - render: app
  - assert:
      contains: "/ for commands"
cleanup:
  unmount: true
