# 05-plan-mode-lockout.yaml
#
# Phase 10 §4.2 — partial upgrade.
#
# /plan on flips session.mode = 'plan' and returns a text result
# ("Plan mode ON — writes/exec are blocked until /plan apply.").
# The current App does NOT render plan-mode in the StatusBar/HUD, and
# slash text-results are not surfaced into the rendered frame either —
# only `dialog` and `effect` results are observable. So we cannot
# assert the "Plan mode ON" banner against the frame.
#
# What we CAN observe end-to-end is the slash dispatch itself: after
# submitting /plan on the PromptInput value clears (because the
# command was routed and run by SlashRegistry rather than buffered as
# user-message text). That clear is the visible side effect the
# harness can witness.
#
# DOWNGRADE NOTE: A full plan-mode lockout test would assert a banner
# in the rendered frame AND attempt to send a normal message and see
# it blocked. The UI banner and the message-block path are tracked in
# the unit-test suite at test/slash/plan.test.ts for now; this plan
# only verifies the slash routing reaches PlanCommand.run.
name: "plan-mode slash routes through registry"
description: >
  Renders the app, types /plan on, submits it, and asserts the prompt
  no longer contains the typed string (it was consumed by the slash
  dispatcher). Banner-rendering for plan mode is deferred (no UI yet).
setup:
  slash:
    - PlanCommand
steps:
  - render: app
  - assert:
      contains: "/ for commands"
  - slash: "plan on"
  # After Enter the prompt clears because the slash was dispatched.
  - wait:
      until:
        notContains: "/plan on"
      timeoutMs: 1500
  - assert:
      notContains: "/plan on"
  # Phase 11 — text results from slashes now render in the message
  # stream; assert the rendered tag plus the banner from PlanCommand.
  - assert:
      contains: "[/plan]"
  - assert:
      contains: "Plan mode ON"
cleanup:
  unmount: true
